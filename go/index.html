<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://linktr.ee/saymoapp" />
  </noscript>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #555555;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }

    .loading {
      max-width: 40rem;
      margin: 3rem auto;
      font-size: 16px;
      line-height: 1.5;
    }

    a {
      color: #174eaf;
    }
  </style>
  <script>
    (() => {
      const APP_STORE_URL = "https://apps.apple.com/us/app/saymo/id6746813879";
      const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.saymo.app";
      const SAFE_DEFAULT_URL = "https://linktr.ee/saymoapp";
      const TRACK_URL = "https://getsaymo-redirectlog-bggkftcef2bmdsed.westeurope-01.azurewebsites.net/api/trackRedirect";
      const PIXEL_URL = "https://getsaymo-redirectlog-bggkftcef2bmdsed.westeurope-01.azurewebsites.net/api/pixel";

      const searchParams = new URLSearchParams(window.location.search);
      const variant = sanitizeVariant(searchParams.get("variant"));
      const requestedStore = normalizeStore(searchParams.get("store"));
      const detection = detectPlatform();
      const source = detectSource(detection.ua);
      const destinationInfo = resolveDestination(requestedStore, detection.platform);
      const destination = buildDestination(destinationInfo.url, searchParams);
      const fallbackUrl = buildFallbackUrl(destinationInfo.url, searchParams, {
        requestedStore,
        variant,
      });

      updateFallbackLink(fallbackUrl);
      updateLoadingCopy(destinationInfo.label);

      const trackingData = {
        platform: detection.platformLabel,
        requestedStore,
        destinationStore: destinationInfo.store,
        variant: variant || "none",
        source,
        userAgent: detection.ua.substring(0, 200),
        referrer: document.referrer || "direct",
        timestamp: new Date().toISOString(),
      };

      let redirectAttempted = false;
      let trackingCompleted = false;

      const doRedirect = () => {
        if (redirectAttempted) return;
        redirectAttempted = true;
        window.location.replace(destination);
        setTimeout(() => {
          window.location.href = destination;
        }, 100);
      };

      Promise.race([
        fetch(TRACK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-cache",
          },
          cache: "no-store",
          body: JSON.stringify(trackingData),
        }).then((response) => {
          trackingCompleted = true;
          return response;
        }),
        new Promise((resolve) => {
          setTimeout(resolve, 800);
        }),
      ])
        .catch(() => undefined)
        .finally(() => {
          if (!trackingCompleted && "sendBeacon" in navigator) {
            try {
              navigator.sendBeacon(TRACK_URL, JSON.stringify({ ...trackingData, method: "beacon" }));
            } catch (error) {
            }
          }
          doRedirect();
        });

      try {
        const pixel = new Image();
        pixel.src =
          `${PIXEL_URL}?p=${encodeURIComponent(destinationInfo.store)}` +
          `&s=${encodeURIComponent(source)}` +
          `&v=${encodeURIComponent(variant || "none")}` +
          `&t=${Date.now()}`;
      } catch (error) {
      }

      setTimeout(doRedirect, 1000);

      function resolveDestination(store, detectedPlatform) {
        if (store === "ios") {
          return { url: APP_STORE_URL, store: "ios", label: "App Store" };
        }
        if (store === "android") {
          return { url: PLAY_STORE_URL, store: "android", label: "Google Play" };
        }
        if (detectedPlatform === "ios") {
          return { url: APP_STORE_URL, store: "ios", label: "App Store" };
        }
        if (detectedPlatform === "android") {
          return { url: PLAY_STORE_URL, store: "android", label: "Google Play" };
        }
        return { url: SAFE_DEFAULT_URL, store: "web", label: "link hub" };
      }

      function buildDestination(baseUrl, params) {
        const url = new URL(baseUrl);
        const forwarded = new URLSearchParams();

        params.forEach((value, key) => {
          if (key === "store" || key === "variant") return;
          forwarded.append(key, value);
        });

        forwarded.forEach((value, key) => {
          url.searchParams.append(key, value);
        });

        return url.toString();
      }

      function buildFallbackUrl(baseUrl, params, options) {
        const url = new URL(baseUrl);
        const forwarded = new URLSearchParams(url.search);

        params.forEach((value, key) => {
          if (key === "store" || key === "variant") return;
          if (!forwarded.has(key)) {
            forwarded.append(key, value);
          }
        });

        if (options.variant) {
          forwarded.set("variant", options.variant);
        }

        if (options.requestedStore !== "auto") {
          forwarded.set("store", options.requestedStore);
        }

        url.search = forwarded.toString();
        return url.toString();
      }

      function updateFallbackLink(url) {
        const link = document.getElementById("fallback-link");
        if (link) {
          link.href = url;
        }
      }

      function updateLoadingCopy(destinationLabel) {
        const label = document.getElementById("destination-label");
        if (label) {
          label.textContent = destinationLabel;
        }
      }

      function normalizeStore(value) {
        if (!value) return "auto";
        const normalized = value.toLowerCase();
        return normalized === "ios" || normalized === "android" ? normalized : "auto";
      }

      function sanitizeVariant(value) {
        if (!value) return "";
        return value.replace(/[^a-z0-9-]/gi, "").slice(0, 80);
      }

      function detectPlatform() {
        const ua = navigator.userAgent || navigator.vendor || window.opera || "";
        const normalized = ua.toLowerCase();
        const isRedditApp = /reddit/i.test(normalized);
        const isIos =
          (/ipad|iphone|ipod/.test(normalized) || (isRedditApp && /ios|iphone|ipad/.test(normalized))) &&
          !window.MSStream;

        if (isIos) {
          return { platform: "ios", platformLabel: "iOS", ua };
        }
        if (/android/.test(normalized)) {
          return { platform: "android", platformLabel: "Android", ua };
        }
        return { platform: "web", platformLabel: "Web", ua };
      }

      function detectSource(ua) {
        if (/reddit/i.test(ua)) return "reddit_app";
        if (/FBAN|FBAV|Instagram|Twitter|Line|WeChat|TikTok/i.test(ua)) return "in_app_browser";
        return "web_browser";
      }
    })();
  </script>
</head>
<body>
  <div class="loading">
    <p>Redirecting to <span id="destination-label">the store</span>...</p>
    <p>
      <small>
        If nothing happens, <a href="https://linktr.ee/saymoapp" id="fallback-link">continue here</a>.
      </small>
    </p>
  </div>
</body>
</html>
